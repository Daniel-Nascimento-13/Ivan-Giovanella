<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Teste de Vídeo — Diagnóstico iOS</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
    }
    /* SEM overlay, SEM isolation, SEM stacking context — SÓ O VÍDEO */
    video {
      display: block;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: #00995D; /* SE APARECER VERDE = VÍDEO NÃO PINTOU */
    }
  </style>
</head>
<body>
  <!--
    TESTE MÍNIMO — SEM GSAP, SEM JS, SEM OVERLAY.
    SE O VÍDEO APARECER AQUI NO IOS SAFARI  → O PROBLEMA É NO CSS/JS DA LANDING (overlay/stacking).
    SE AQUI TAMBÉM FICAR VERDE/PRETO        → O PROBLEMA É O ARQUIVO/CODEC OU POLÍTICA DE AUTOPLAY DO DEVICE.
  -->
  <video
    src="/videos/VIDEO-UNIMED-LOGO.mp4"
    muted
    playsinline
    webkit-playsinline
    autoplay
    loop
    preload="auto"
  ></video>
</body>
</html>
